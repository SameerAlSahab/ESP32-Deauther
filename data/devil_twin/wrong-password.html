<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Authentication Failed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .router-container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }

        .router-header {
            background: #c0392b;
            padding: 20px;
            text-align: center;
        }

        .router-header h1 {
            color: white;
            font-size: 22px;
            font-weight: 600;
        }

        .router-body {
            padding: 30px;
            background: #f8f9fa;
            text-align: center;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .error-icon svg {
            width: 60px;
            height: 60px;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 20px;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        button {
            background: #e67e22;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #d35400;
        }

        .router-footer {
            background: #ecf0f1;
            padding: 15px;
            text-align: center;
            font-size: 11px;
            color: #7f8f8d;
        }

        .countdown {
            color: #e67e22;
            font-weight: bold;
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="router-container">
        <div class="router-header">
            <h1>Authentication Failed</h1>
        </div>

        <div class="router-body">
            <div class="error-icon">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="#c0392b" stroke-width="2"/>
                    <line x1="12" y1="8" x2="12" y2="12" stroke="#c0392b" stroke-width="2"/>
                    <circle cx="12" cy="16" r="1" fill="#c0392b"/>
                </svg>
            </div>

            <h2>Incorrect Password</h2>
            <p>The password you entered does not match our records.<br>
            Please verify your password and try again.</p>

            <button onclick="window.location.href='/'">Try Again</button>

            <div class="countdown" id="countdown">Redirecting in 5 seconds...</div>
        </div>

        <div class="router-footer">
            <p>© 2024 Router Management System</p>
        </div>
    </div>

    <script>
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');

        const interval = setInterval(function() {
            seconds--;
            countdownEl.textContent = 'Redirecting in ' + seconds + ' seconds...';

            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = '/';
            }
        }, 1000);

        // Also allow manual retry
        setTimeout(function() {
            window.location.href = '/';
        }, 5000);
    </script>
</body>
</html>
