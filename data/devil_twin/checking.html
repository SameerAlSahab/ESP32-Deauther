<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Verifying</title>
<style>
body{background:#1a1a1a;color:#fff;text-align:center;padding:20px;font-family:monospace;}
.loader{border:4px solid #333;border-top:4px solid #e67e22;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:20px auto;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader"></div>
<h2>Verifying Credentials...</h2>
<p>Please wait while we validate your information.</p>
<p style="font-size:12px;color:#888;">Do not close this window.</p>
</body>
</html>
